services:
  backend:
    build: ./backend
    container_name: sto-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/data
      - ./backend:/app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: sto-frontend
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/package.json:/app/package.json
      - ./frontend/components.json:/app/components.json
    ports:
      - "3000:3000"
    depends_on:
      - backend
