services:
  backend:
    build: ./backend
    container_name: sto-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
      - ./backend:/app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: sto-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
